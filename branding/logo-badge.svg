<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F0FE"/>
      <stop offset="100%" stop-color="#F5F0E6"/>
    </linearGradient>
    <linearGradient id="hijau" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#1F4D3A"/>
      <stop offset="100%" stop-color="#2E6B45"/>
    </linearGradient>
    <linearGradient id="hijau2" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#2E6B45"/>
      <stop offset="100%" stop-color="#3A8B59"/>
    </linearGradient>
  </defs>
  <!-- Ring luar -->
  <circle cx="256" cy="256" r="240" fill="#2A6B7A" opacity="0.08"/>
  <circle cx="256" cy="256" r="230" fill="none" stroke="#2A6B7A" stroke-width="8"/>
  <circle cx="256" cy="256" r="220" fill="#F5F0E6"/>
  <!-- Ring dalam -->
  <circle cx="256" cy="256" r="218" fill="none" stroke="#2A6B7A" stroke-width="2" opacity="0.2"/>

  <!-- Langit -->
  <ellipse cx="256" cy="180" rx="140" ry="100" fill="url(#sky)"/>

  <!-- Matahari -->
  <circle cx="340" cy="140" r="30" fill="#F4A261"/>
  <circle cx="340" cy="140" r="36" fill="none" stroke="#F4A261" stroke-width="3" opacity="0.4"/>
  <line x1="340" y1="96" x2="340" y2="104" stroke="#F4A261" stroke-width="3" opacity="0.6"/>
  <line x1="340" y1="176" x2="340" y2="184" stroke="#F4A261" stroke-width="3" opacity="0.6"/>
  <line x1="296" y1="140" x2="304" y2="140" stroke="#F4A261" stroke-width="3" opacity="0.6"/>
  <line x1="376" y1="140" x2="384" y2="140" stroke="#F4A261" stroke-width="3" opacity="0.6"/>

  <!-- Gunung belakang -->
  <polygon points="110,290 220,130 280,220 330,150 400,290" fill="#6B9E80" opacity="0.5"/>

  <!-- Gunung utama -->
  <polygon points="100,300 256,120 412,300" fill="url(#hijau)"/>

  <!-- Salju puncak -->
  <polygon points="256,120 238,150 256,140 274,150" fill="#F8FAFC"/>
  <polygon points="256,120 246,145 256,138 266,145" fill="#FFFFFF"/>

  <!-- Trail zigzag -->
  <polyline points="306,280 290,260 310,240 295,220 315,200 300,180 280,160" fill="none" stroke="#E07A2F" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Bendera puncak -->
  <line x1="280" y1="160" x2="280" y2="135" stroke="#5C4033" stroke-width="3"/>
  <polygon points="280,135 305,143 280,151" fill="#E07A2F"/>

  <!-- Pinus kiri -->
  <polygon points="140,290 128,260 140,250 130,220 145,210 138,180 152,175 140,290" fill="#1F4D3A"/>
  <rect x="146" y="285" width="6" height="10" rx="2" fill="#5C4033"/>

  <!-- Pinus kanan -->
  <polygon points="370,290 358,265 370,255 360,230 375,220 368,195 382,190 370,290" fill="#2E6B45"/>
  <rect x="376" y="285" width="6" height="10" rx="2" fill="#5C4033"/>

  <!-- Ransel -->
  <rect x="366" y="240" width="20" height="24" rx="4" fill="#5C4033" transform="rotate(-10 376 252)"/>
  <rect x="366" y="238" width="8" height="6" rx="2" fill="#7C5C4D" transform="rotate(-10 376 252)"/>

  <!-- Tenda kecil -->
  <polygon points="158,280 168,255 178,280" fill="#D4A373"/>
  <polygon points="158,280 168,255 168,280" fill="#C48B5A"/>
  <line x1="168" y1="255" x2="168" y2="280" stroke="#A07040" stroke-width="1"/>

  <!-- Tanah/rumput bawah -->
  <ellipse cx="256" cy="300" rx="170" ry="15" fill="#2E6B45" opacity="0.3"/>
</svg>