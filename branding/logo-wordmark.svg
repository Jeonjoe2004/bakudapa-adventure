<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200">
  <defs>
    <linearGradient id="g-hijau" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#1F4D3A"/>
      <stop offset="100%" stop-color="#2E6B45"/>
    </linearGradient>
  </defs>

  <!-- Icon (badge kecil) -->
  <g transform="translate(10,10) scale(0.7)">
    <circle cx="128" cy="128" r="115" fill="#F5F0E6" stroke="#2A6B7A" stroke-width="4"/>
    <!-- Gunung utama -->
    <polygon points="50,175 128,65 206,175" fill="url(#g-hijau)"/>
    <!-- Salju -->
    <polygon points="128,65 118,85 128,80 138,85" fill="#FFFFFF"/>
    <!-- Trail -->
    <polyline points="160,170 150,155 165,140 155,125 170,110 160,95" fill="none" stroke="#E07A2F" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Bendera -->
    <line x1="160" y1="95" x2="160" y2="75" stroke="#5C4033" stroke-width="2"/>
    <polygon points="160,75 178,80 160,85" fill="#E07A2F"/>
    <!-- Matahari -->
    <circle cx="170" cy="80" r="16" fill="#F4A261" opacity="0.6"/>
    <!-- Pinus -->
    <polygon points="72,175 64,155 72,150 66,135 76,130 72,175" fill="#1F4D3A"/>
    <polygon points="185,175 178,158 185,153 180,138 190,133 185,175" fill="#2E6B45"/>
  </g>

  <!-- Teks BAKUDAPA -->
  <text x="100" y="70" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="44" font-weight="800" letter-spacing="6" fill="#1F4D3A">BAKUDAPA</text>

  <!-- Teks ADVENTURE -->
  <text x="100" y="120" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="600" letter-spacing="12" fill="#E07A2F">ADVENTURE</text>

  <!-- Garis dekoratif -->
  <line x1="100" y1="140" x2="520" y2="140" stroke="#2A6B7A" stroke-width="1.5" opacity="0.3"/>

  <!-- Tagline -->
  <text x="100" y="165" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="400" letter-spacing="4" fill="#2A6B7A" opacity="0.6">JELAJAHI INDONESIA</text>
</svg>