name: Android CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/android/BakudapaAdventure/**'
      - '.github/workflows/android.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/android/BakudapaAdventure/**'

defaults:
  run:
    working-directory: apps/android/BakudapaAdventure

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Create google-services.json
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json

      - name: Run lint
        run: ./gradlew lintDebug

      - name: Run tests
        run: ./gradlew testDebugUnitTest

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bakudapa-adventure-debug
          path: apps/android/BakudapaAdventure/app/build/outputs/apk/debug/*.apk
