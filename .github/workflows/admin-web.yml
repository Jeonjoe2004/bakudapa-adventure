name: Admin Web CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/admin-web/**'
      - '.github/workflows/admin-web.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/admin-web/**'

defaults:
  run:
    working-directory: apps/admin-web

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/admin-web/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: admin-web-dist
          path: apps/admin-web/dist/
